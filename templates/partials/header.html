{% load static %}
<header class="bg-white shadow-sm sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="{% url 'home' %}" class="flex items-center gap-2">
      <img src="{% static 'img/logo.png' %}" alt="Стильняшки" class="h-8 w-auto" onerror="this.style.display='none'"/>
      <span class="text-xl font-bold text-pink-600">Стильняшки</span>
    </a>
    <nav class="hidden md:flex gap-6 text-sm font-medium">
      <a href="{% url 'home' %}" class="hover:text-pink-600 transition-colors">Главная</a>
      <a href="{% url 'catalog' %}" class="hover:text-pink-600 transition-colors">Каталог</a>
      <a href="{% url 'cart' %}" class="hover:text-pink-600 transition-colors">Корзина</a>
      {% if user.is_authenticated %}
        <a href="{% url 'account' %}" class="hover:text-pink-600 transition-colors">Аккаунт</a>
        <a href="{% url 'logout' %}" class="hover:text-pink-600 transition-colors">Выход</a>
      {% else %}
        <a href="{% url 'login' %}" class="hover:text-pink-600 transition-colors">Войти</a>
        <a href="{% url 'register' %}" class="hover:text-pink-600 transition-colors">Регистрация</a>
      {% endif %}
    </nav>
    <button id="mobile-menu-btn" class="md:hidden p-2 rounded hover:bg-gray-100">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>
</header>
