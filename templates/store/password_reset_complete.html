{% extends "base.html" %}
{% load static %}

{% block title %}Стильняшки - Пароль изменён{% endblock %}
{% block body_class %}body-auth body-auth--white{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<main class="auth-page">
  <div class="auth-page__wrap">
    <div class="auth-card">
      <div class="auth-card__head">
        <h1 class="auth-card__title brand-font">Готово!</h1>
        <p class="auth-card__subtitle">Пароль успешно изменён. Теперь можно войти.</p>
      </div>

      <a class="auth-btn auth-btn--primary" href="{% url 'login' %}">Войти</a>
    </div>

    <div class="auth-blob auth-blob--yellow"></div>
    <div class="auth-blob auth-blob--blue"></div>
  </div>
</main>
{% endblock %}
