{% extends 'base.html' %}
{% block title %}Вход — Стильняшки{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4 py-12">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6">Вход в аккаунт</h1>
    <form method="post" class="space-y-5">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium mb-1" for="id_username">Имя пользователя</label>
        <input id="id_username" type="text" name="username" autocomplete="username"
               class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400"
               required autofocus/>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1" for="id_password">Пароль</label>
        <input id="id_password" type="password" name="password" autocomplete="current-password"
               class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400"
               required/>
      </div>
      <button type="submit" class="w-full bg-pink-600 text-white py-3 rounded-xl font-semibold hover:bg-pink-700 transition-colors">Войти</button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-6">
      Нет аккаунта? <a href="{% url 'register' %}" class="text-pink-600 hover:underline">Зарегистрироваться</a>
    </p>
  </div>
</div>
{% endblock %}
