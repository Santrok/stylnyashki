<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Переход к оплате</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; background:#fff; color:#111; }
    .box { max-width:680px; margin:40px auto; text-align:center; }
    .btn { display:inline-block; background:var(--purple); color:#fff; padding:10px 16px; border-radius:8px; text-decoration:none; font-weight:800; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Переадресация на платёжный шлюз…</h2>
    <p>Если автоматическая переадресация не сработает, нажмите кнопку ниже.</p>

    <form id="payForm" method="post" action="{{ payment_url }}">
      {% for k, v in form_data.items %}
        <input type="hidden" name="{{ k }}" value="{{ v|escape }}">
      {% endfor %}
      <noscript>
        <button class="btn" type="submit">Перейти к оплате</button>
      </noscript>
    </form>

    <script>document.getElementById('payForm').submit();</script>
  </div>
</body>
</html>
